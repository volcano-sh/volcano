# this config file contains all config fields with comments
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
featureGates:
  MutatingAdmissionPolicy: true
containerdConfigPatches:
  # Enable CDI as described in
  # https://tags.cncf.io/container-device-interface#containerd-configuration
  - |-
    [plugins."io.containerd.grpc.v1.cri"]
      enable_cdi = true
# 1 control plane node and 4 workers
nodes:
  # the control plane node config
  - role: control-plane
    kubeadmConfigPatches:
      - |
        apiVersion: kubelet.config.k8s.io/v1beta1
        kind: KubeletConfiguration
        containerLogMaxSize: "50Mi"
      # Explicit kubeadm.k8s.io/v1beta3 for clusters up through Kubernetes 1.35 (current kind default).
      # When moving e2e to Kubernetes 1.36+ / kubeadm v1beta4, add a second patch with
      # apiVersion: kubeadm.k8s.io/v1beta4 and apiServer.extraArgs as a list (name/value pairs).
      - |
        kind: ClusterConfiguration
        apiVersion: kubeadm.k8s.io/v1beta3
        apiServer:
          extraArgs:
            runtime-config: "admissionregistration.k8s.io/v1beta1"
            enable-admission-plugins: "MutatingAdmissionPolicy"
  # the four workers
  - role: worker
  - role: worker
  - role: worker
  - role: worker