apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: "{{.Name}}"
  namespace: default
spec:
  schedulerName: volcano
  minAvailable: {{.MinAvailable}}
  queue: {{.Queue}}
  plugins:
    svc: []
    env: []
  tasks:
    - name: worker
      replicas: {{.Replicas}}
      template:
        spec:
          schedulerName: volcano
          containers:
            - name: worker
              image: busybox:1.36
              command: ["sh", "-c", "sleep 30"]
              resources:
                requests:
                  cpu: "{{.CPU}}"
                  memory: "{{.Memory}}"
          tolerations:
            - key: kwok.x-k8s.io/node
              operator: Exists
              effect: NoSchedule
          nodeSelector:
            type: kwok
          restartPolicy: Never
