apiVersion: v1
kind: Pod
metadata:
  name: {{ .PodName }}
  namespace: {{ .Namespace }}
  labels:
    volcano.sh/benchmark: "true"
spec:
  schedulerName: {{ .SchedulerName }}
  containers:
    - name: {{ .PodName }}
      image: {{ .Image }}
      imagePullPolicy: IfNotPresent
      {{- if .Command }}
      command:
      {{- range .Command }}
        - {{ . }}
      {{- end }}
      {{- end }}
      resources:
        requests:
          cpu: {{ .CPU }}
          memory: {{ .Memory }}
        limits:
          cpu: {{ .CPU }}
          memory: {{ .Memory }}
  {{- if ne (env "SKIP_KWOK") "true" }}
  nodeSelector:
    type: kwok
  tolerations:
    - key: kwok.x-k8s.io/node
      operator: Exists
      effect: NoSchedule
  {{- end }}
