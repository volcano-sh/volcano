name: Scheduling Gates

on:
  workflow_call:

permissions: read-all

jobs:
  e2e_scheduling_gates:
    runs-on: ubuntu-24.04
    name: E2E about Scheduling Gates
    timeout-minutes: 40
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 1.26.x

      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install dependences
        run: |
          GO111MODULE="on" go install sigs.k8s.io/kind@v0.31.0
          curl -LO https://dl.k8s.io/release/v1.36.0/bin/linux/amd64/kubectl && sudo install kubectl /usr/local/bin/kubectl

      - name: Download Images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: volcano-images
          path: _output/images

      - name: Load Images
        run: |
          make load-images

      - name: Run E2E Tests
        run: |
          export ARTIFACTS_PATH=${{ github.workspace }}/e2e-scheduling-gates-logs
          make e2e-test-schedulinggates FORCE_REBUILD=false

      - name: Upload e2e scheduling gates logs
        if: '!success()'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: volcano_e2e_scheduling_gates_logs
          path: ${{ github.workspace }}/e2e-scheduling-gates-logs
