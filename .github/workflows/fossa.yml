name: FOSSA
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  build:
    # Fork pull requests cannot access repository secrets, so FOSSA only runs
    # on master pushes and same-repository pull requests.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
      - run: go version
      - name: run FOSSA analysis
        uses: fossas/fossa-action@v1.9.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: run FOSSA policy test
        uses: fossas/fossa-action@v1.9.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true
          test-diff-revision: ${{ github.event.pull_request.base.sha }}